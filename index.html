<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PyTeach AI — Learn Python Fast</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; background: #ffffff; font-family: 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.2s ease forwards; }
  
  button { cursor: pointer; font-family: inherit; border: none; outline: none; transition: transform 0.1s, opacity 0.15s; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  
  textarea { -webkit-tap-highlight-color: transparent; font-family: 'Fira Code', monospace; }
  select { cursor: pointer; font-family: inherit; outline: none; }

  /* Mobile sidebar overlay */
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; }
  .sidebar-overlay.open { display: block; }

  .sidebar {
    position: fixed; left: -280px; top: 0; bottom: 0; width: 260px;
    background: #ffffff; border-right: 1px solid #e2e8f0; z-index: 60;
    transition: left 0.3s ease; display: flex; flex-direction: column;
  }
  .sidebar.open { left: 0; }

  /* Inline code styling matching DataCamp */
  code { background: #2d3748; padding: 2px 6px; border-radius: 4px; font-family: 'Fira Code', monospace; font-size: 0.9em; color: #e2e8f0; }

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const OPENROUTER_KEY = "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";

const CURRICULUM = [
  { id: 0, topic: "Variables & Print", desc: "Store data & print it" },
  { id: 1, topic: "Strings", desc: "Text manipulation" },
  { id: 2, topic: "Numbers & Math", desc: "Arithmetic & types" },
  { id: 3, topic: "Lists", desc: "Collections & indexing" },
  { id: 4, topic: "Conditionals", desc: "if/elif/else logic" },
  { id: 5, topic: "Loops", desc: "for & while loops" },
  { id: 6, topic: "Functions", desc: "Reusable code blocks" },
];

async function callOpenRouter(prompt, selectedModel, jsonMode = false) {
  try {
    const body = { model: selectedModel, messages: [{ role: "user", content: prompt }], temperature: 0.7, max_tokens: 1500 };
    if (jsonMode) body.response_format = { type: "json_object" };

    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${OPENROUTER_KEY}` },
      body: JSON.stringify(body),
    });
    
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || "";
    if (jsonMode) return JSON.parse(text.replace(/```json\n?|\n?```/g, "").trim());
    return text;
  } catch (e) { return null; }
}

async function runPython(code) {
  try {
    const res = await fetch("https://emkc.org/api/v2/piston/execute", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ language: "python", version: "3.10.0", files: [{ content: code }] }),
    });
    const data = await res.json();
    return { stdout: data.run?.stdout || "", stderr: data.run?.stderr || "" };
  } catch {
    return { stdout: "", stderr: "Connection error." };
  }
}

function App() {
  const [topicIdx, setTopicIdx]       = useState(0);
  const [taskNum, setTaskNum]         = useState(1);
  const [task, setTask]               = useState(null);
  const [code, setCode]               = useState("");
  const [output, setOutput]           = useState(null);
  const [feedback, setFeedback]       = useState(null);
  
  // UI States
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [instOpen, setInstOpen]       = useState(true);
  const [consoleOpen, setConsoleOpen] = useState(false);
  const [loadState, setLoadState]     = useState(""); // "task", "run", "submit", ""
  
  const [model, setModel]             = useState("openai/gpt-4o-mini"); 
  const textareaRef = useRef(null);

  const generateTask = useCallback(async (tIdx, tNum, currentModel) => {
    setLoadState("task");
    setFeedback(null); setOutput(null); setConsoleOpen(false); setInstOpen(true);
    
    const topic = CURRICULUM[tIdx];
    const prompt = `You are a strict technical instructor. Generate micro-task ${tNum}/3 for Python topic: "${topic.topic}". 
Crucial: The task must be EXTREMELY simple and beginner-friendly, exactly like a DataCamp exercise.

Return ONLY valid JSON:
{
  "instructions": [
    "Instruction step 1 (use backticks for variable names/code). e.g., 'Create a variable `savings` with the value of `100`.'",
    "Instruction step 2 (optional). e.g., 'Check out this variable by typing `print(savings)`.'"
  ],
  "starterCode": "# Create a variable savings\\n\\n\\n# Print out savings\\n",
  "hint": "One simple sentence telling them exactly what to type if they are stuck.",
  "checkDescription": "What must the code do to pass? (e.g., 'Must define savings and print it')"
}`;

    const result = await callOpenRouter(prompt, currentModel, true);
    if (result && result.instructions) {
      setTask(result);
      setCode(result.starterCode || "\n");
    } else {
      setTask({ instructions: ["Failed to load task. Please check API key or model."], starterCode: "" });
    }
    setLoadState("");
  }, []);

  useEffect(() => { generateTask(0, 1, model); }, []);

  const handleRun = async () => {
    if (!code.trim() || loadState) return;
    setLoadState("run");
    const result = await runPython(code);
    setOutput(result);
    setConsoleOpen(true);
    setLoadState("");
  };

  const handleSubmit = async () => {
    if (!code.trim() || loadState) return;
    setLoadState("submit");
    
    // Auto-run first to get output for the AI to check
    const result = await runPython(code);
    setOutput(result);
    setConsoleOpen(true);

    const evalPrompt = `Evaluate this Python code based on the instructions.
INSTRUCTIONS: ${task?.instructions.join(" ")}
CODE:
\`\`\`python
${code}
\`\`\`
OUTPUT:
${result.stdout}
${result.stderr}

Return JSON:
{
  "passed": true/false,
  "message": "Short feedback message (e.g., 'Great job!' or 'You forgot to print the variable.')"
}`;

    const ev = await callOpenRouter(evalPrompt, model, true);
    if (ev) setFeedback(ev);
    setLoadState("");
  };

  const handleNext = async () => {
    if (taskNum < 3) {
      await generateTask(topicIdx, taskNum + 1, model);
      setTaskNum(n => n + 1);
    } else if (topicIdx < CURRICULUM.length - 1) {
      setTopicIdx(i => i + 1);
      setTaskNum(1);
      await generateTask(topicIdx + 1, 1, model);
    }
  };

  const handleTab = (e) => {
    if (e.key === "Tab") {
      e.preventDefault();
      const s = e.target.selectionStart, end = e.target.selectionEnd;
      setCode(code.substring(0, s) + "    " + code.substring(end));
      requestAnimationFrame(() => textareaRef.current.selectionStart = textareaRef.current.selectionEnd = s + 4);
    }
  };

  // Helper to render markdown-like backticks as <code> elements safely
  const renderInstruction = (text) => {
    const parts = text.split(/`([^`]+)`/g);
    return parts.map((part, i) => i % 2 === 1 ? <code key={i}>{part}</code> : part);
  };

  return (
    <div style={{ display: "flex", height: "100vh", overflow: "hidden", background: "#f8fafc" }}>
      
      {/* Sidebar Overlay */}
      <div className={`sidebar-overlay ${sidebarOpen ? "open" : ""}`} onClick={() => setSidebarOpen(false)} />

      {/* Sidebar */}
      <div className={`sidebar ${sidebarOpen ? "open" : ""}`}>
        <div style={{ padding: "16px", borderBottom: "1px solid #e2e8f0", background: "#f8fafc" }}>
          <h2 style={{ fontSize: 18, color: "#0f172a", margin: 0 }}>Menu</h2>
        </div>
        <div style={{ padding: "16px", flex: 1, overflowY: "auto" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#64748b", textTransform: "uppercase", marginBottom: 12 }}>Curriculum</div>
          {CURRICULUM.map((t, i) => (
            <div key={i} 
                 onClick={() => { setTopicIdx(i); setTaskNum(1); setSidebarOpen(false); generateTask(i, 1, model); }}
                 style={{ padding: "10px 12px", borderRadius: 8, cursor: "pointer", marginBottom: 4, background: topicIdx === i ? "#eff6ff" : "transparent", color: topicIdx === i ? "#2563eb" : "#475569", fontWeight: topicIdx === i ? 600 : 400 }}>
              {i + 1}. {t.topic}
            </div>
          ))}
        </div>
      </div>

      {/* Main Content */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, height: "100%" }}>
        
        {/* Top Navbar */}
        <div style={{ height: 50, background: "#1e1e1e", display: "flex", alignItems: "center", padding: "0 12px", gap: 12, flexShrink: 0, borderBottom: "1px solid #333" }}>
          <button onClick={() => setSidebarOpen(true)} style={{ background: "transparent", color: "#fff", fontSize: 20 }}>☰</button>
          
          {/* Fake Tabs for aesthetics */}
          <div style={{ display: "flex", background: "#ffffff", borderRadius: 6, overflow: "hidden", marginLeft: "auto", marginRight: "auto" }}>
            <div style={{ padding: "4px 12px", fontSize: 13, fontWeight: 600, background: "#ffffff", color: "#0f172a", borderRight: "1px solid #e2e8f0" }}>Exercise</div>
            <div style={{ padding: "4px 12px", fontSize: 13, fontWeight: 600, background: "#1e293b", color: "#ffffff", borderRight: "1px solid #334155" }}>Code</div>
            <div style={{ padding: "4px 12px", fontSize: 13, fontWeight: 600, background: "#ffffff", color: "#0f172a" }}>Shell</div>
          </div>

          <select value={model} onChange={e => { setModel(e.target.value); generateTask(topicIdx, taskNum, e.target.value); }}
            style={{ background: "#2d2d2d", color: "#fff", border: "none", borderRadius: 4, padding: "4px 8px", fontSize: 11 }}>
            <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
            <option value="google/gemini-flash-1.5">Gemini Flash</option>
            <option value="anthropic/claude-3-haiku">Claude Haiku</option>
          </select>
        </div>

        {/* Instructions Panel (Collapsible) */}
        <div style={{ background: "#161b28", color: "#ffffff", flexShrink: 0, display: "flex", flexDirection: "column", transition: "height 0.2s" }}>
          <div style={{ padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: instOpen ? "1px solid #2d3748" : "none" }}>
            <h3 style={{ fontSize: 16, margin: 0, fontWeight: 600 }}>Instructions</h3>
            <button onClick={() => setInstOpen(!instOpen)} style={{ background: "transparent", color: "#94a3b8", fontSize: 14 }}>
              {instOpen ? "hide \u2212" : "show \u002B"}
            </button>
          </div>
          
          {instOpen && (
            <div className="fade-in" style={{ padding: "16px", fontSize: 14, lineHeight: 1.6 }}>
              {loadState === "task" ? (
                <div style={{ color: "#94a3b8" }}>Loading task...</div>
              ) : (
                <ul style={{ paddingLeft: 20, margin: 0, color: "#f1f5f9" }}>
                  {task?.instructions?.map((inst, i) => (
                    <li key={i} style={{ marginBottom: 12 }}>{renderInstruction(inst)}</li>
                  ))}
                </ul>
              )}
            </div>
          )}
        </div>

        {/* Code Editor Area */}
        <div style={{ flex: 1, background: "#ffffff", display: "flex", flexDirection: "column", position: "relative" }}>
          <textarea
            ref={textareaRef}
            value={code}
            onChange={e => setCode(e.target.value)}
            onKeyDown={handleTab}
            spellCheck={false}
            style={{ flex: 1, width: "100%", padding: "16px", border: "none", resize: "none", fontSize: 15, lineHeight: 1.5, color: "#1e293b", outline: "none" }}
            placeholder="Write your code here..."
          />
          
          {/* Output / Console Sliding Panel */}
          {consoleOpen && (
            <div className="fade-in" style={{ height: "40%", borderTop: "2px solid #e2e8f0", background: "#f8fafc", display: "flex", flexDirection: "column", position: "absolute", bottom: 0, left: 0, right: 0 }}>
              <div style={{ padding: "8px 16px", background: "#e2e8f0", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, fontWeight: 600, color: "#475569" }}>
                <span>Console Output</span>
                <button onClick={() => setConsoleOpen(false)} style={{ background: "transparent", fontSize: 16, color: "#64748b" }}>×</button>
              </div>
              <pre style={{ flex: 1, padding: "12px 16px", margin: 0, overflowY: "auto", fontFamily: "'Fira Code', monospace", fontSize: 13, color: output?.stderr ? "#ef4444" : "#0f172a" }}>
                {output?.stderr || output?.stdout || "No output"}
              </pre>
            </div>
          )}
        </div>

        {/* Feedback Banner (Shows above bottom bar when submitted) */}
        {feedback && (
          <div className="fade-in" style={{ background: feedback.passed ? "#dcfce7" : "#fee2e2", padding: "12px 16px", borderTop: `1px solid ${feedback.passed ? "#bbf7d0" : "#fecaca"}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
            <div style={{ fontSize: 14, color: feedback.passed ? "#166534" : "#991b1b", fontWeight: 500 }}>
              {feedback.passed ? "✅ " : "❌ "}{feedback.message}
            </div>
            {feedback.passed && (
              <button onClick={handleNext} style={{ background: "#22c55e", color: "#fff", padding: "6px 12px", borderRadius: 4, fontSize: 13, fontWeight: 600 }}>Next Exercise ➔</button>
            )}
          </div>
        )}

        {/* Bottom Action Bar */}
        <div style={{ height: 60, background: "#f1f5f9", borderTop: "1px solid #e2e8f0", display: "flex", alignItems: "center", padding: "0 16px", gap: 12, flexShrink: 0 }}>
          
          <button onClick={() => alert(task?.hint || "No hint available.")} 
                  style={{ width: 36, height: 36, borderRadius: "50%", background: "#e2e8f0", color: "#475569", fontWeight: 700, fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>
            ?
          </button>

          <button onClick={handleRun} disabled={!!loadState}
                  style={{ padding: "10px 24px", borderRadius: 30, background: "#e2e8f0", color: "#0f172a", fontWeight: 600, fontSize: 14, marginLeft: "auto" }}>
            {loadState === "run" ? "Running..." : "Run"}
          </button>
          
          <button onClick={handleSubmit} disabled={!!loadState}
                  style={{ padding: "10px 24px", borderRadius: 30, background: "#22c55e", color: "#ffffff", fontWeight: 600, fontSize: 14 }}>
            {loadState === "submit" ? "Checking..." : "Submit"}
          </button>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
